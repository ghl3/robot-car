# TEB local planner for Ackermann (car-like) steering.
# Values based on Waveshare's tuned jetracer_ros TEB config.

TebLocalPlannerROS:
  # Trajectory
  teb_autosize: true
  dt_ref: 0.5
  dt_hysteresis: 0.1
  global_plan_overwrite_orientation: true
  max_global_plan_lookahead_dist: 2.0
  feasibility_check_no_poses: 3

  # Velocity limits (conservative for indoor use with 5.5Hz lidar)
  max_vel_x: 0.3
  max_vel_x_backwards: 0.15
  max_vel_y: 0.0
  max_vel_theta: 1.0
  acc_lim_x: 0.5
  acc_lim_theta: 1.0

  # Ackermann (car-like) constraints
  # Wheelbase and turning radius from Waveshare's tuned jetracer_ros config.
  # cmd_angle_instead_of_rotvel puts steering angle directly into cmd_vel.angular.z,
  # which matches how the jetracer driver already interprets it.
  min_turning_radius: 0.5
  wheelbase: 0.24
  cmd_angle_instead_of_rotvel: true

  # Obstacle avoidance
  min_obstacle_dist: 0.15
  include_costmap_obstacles: true
  costmap_obstacles_behind_robot_dist: 1.0

  # Optimization
  no_inner_iterations: 5
  no_outer_iterations: 4
  optimization_activate: true
  optimization_verbose: false
  penalty_epsilon: 0.1
  weight_max_vel_x: 2
  weight_max_vel_theta: 1
  weight_acc_lim_x: 1
  weight_acc_lim_theta: 1
  weight_kinematics_nh: 1000
  weight_kinematics_forward_drive: 100
  weight_kinematics_turning_radius: 50
  weight_optimaltime: 1
  weight_obstacle: 50

  # Homotopy class planning -- disabled to save CPU on Jetson Nano
  enable_homotopy_class_planning: false

  # Recovery
  oscillation_recovery: true
  shrink_horizon_backup: true

  # Footprint model
  footprint_model:
    type: "polygon"
    vertices: [[-0.10, -0.08], [-0.10, 0.08], [0.10, 0.08], [0.10, -0.08]]
