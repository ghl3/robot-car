# move_base top-level parameters.

# Use TEB local planner (supports Ackermann steering)
base_local_planner: teb_local_planner/TebLocalPlannerROS

# Planning and control rates
controller_frequency: 5.0
planner_frequency: 1.0
planner_patience: 5.0
controller_patience: 10.0

# Oscillation detection
oscillation_timeout: 10.0
oscillation_distance: 0.2

# Recovery behaviors -- disable rotate-in-place (impossible for Ackermann car)
clearing_rotation_allowed: false
recovery_behavior_enabled: true

# Conservative shutdown
shutdown_costmaps: false
