# slam_toolbox configuration for Jetson Nano + RPLIDAR A1 (~5.5Hz) + wheel encoder odometry
# Runs async_slam_toolbox_node -- async mode skips scans if CPU is busy rather than
# queuing them, so the robot never falls behind real-time on the Nano's limited CPU.
#
# Uploaded to /tmp/slam_toolbox_params.yaml on the Jetson during the connect flow.
# Loaded via: rosparam load /tmp/slam_toolbox_params.yaml /slam_toolbox

# --- Solver ---
solver_plugin: solver_plugins::CeresSolver
ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
ceres_preconditioner: SCHUR_JACOBI
ceres_trust_strategy: LEVENBERG_MARQUARDT
ceres_dogleg_type: TRADITIONAL_DOGLEG
# HuberLoss: robust to odometry drift from wheel-encoder-only setup (no IMU).
# Downweights outlier scan matches caused by encoder slip on bumpy surfaces.
ceres_loss_function: HuberLoss

# --- Frames ---
odom_frame: odom
map_frame: map
base_frame: base_footprint
scan_topic: /scan_filtered
mode: mapping

# When map_file_name is set (by start_jetracer.sh), slam_toolbox auto-loads
# the serialized pose graph on startup and continues mapping from it.
# map_file_name is set dynamically -- do not hardcode it here.
map_start_at_dock: true

# --- General ---
throttle_scans: 1
transform_publish_period: 0.05          # 20Hz map->odom TF (default 50Hz, reduced for CPU)
map_update_interval: 2.0                # publish /map every 2s
resolution: 0.05                        # 5cm per cell
max_laser_range: 8.0                    # RPLIDAR A1 max usable range
minimum_time_interval: 0.0              # process every scan -- at 5.5Hz we can't skip any
transform_timeout: 0.2
tf_buffer_duration: 30.0
stack_size_to_use: 40000000             # 40MB for map serialization
enable_interactive_mode: false          # saves RAM on Nano (no RVIZ marker cache)

# --- Scan matching ---
use_scan_matching: true
use_scan_barycenter: true
minimum_travel_distance: 0.3            # meters before processing a new scan (default 0.5)
minimum_travel_heading: 0.3             # radians before processing a new scan (default 0.5)
scan_buffer_size: 10
scan_buffer_maximum_scan_distance: 10.0
link_match_minimum_response_fine: 0.1
link_scan_maximum_distance: 1.5
loop_search_maximum_distance: 3.0

# --- Loop closure ---
# When the robot revisits a mapped area, slam_toolbox detects the overlap and
# optimizes the full pose graph to correct accumulated drift.
do_loop_closing: true
loop_match_minimum_chain_size: 10
loop_match_maximum_variance_coarse: 3.0
loop_match_minimum_response_coarse: 0.35
# Increase loop_match_minimum_response_fine if you see false loop closures
loop_match_minimum_response_fine: 0.45

# --- Correlation search space ---
# IMPORTANT: dimension / resolution must yield a clean integer.
# The internal grid size is 2*N+1 where N = dimension/resolution. If N is not
# an integer, rounding can produce an even grid size, which triggers an assertion
# failure: "gridSize % 2 == 1". Safe pairs: 0.5/0.01=50, 1.0/0.01=100.
correlation_search_space_dimension: 0.5
correlation_search_space_resolution: 0.01
correlation_search_space_smear_deviation: 0.1

# Same constraint applies to loop search space
loop_search_space_dimension: 8.0        # 8.0 / 0.05 = 160 (clean integer)
loop_search_space_resolution: 0.05
loop_search_space_smear_deviation: 0.03

# --- Penalties ---
distance_variance_penalty: 0.5
angle_variance_penalty: 1.0
fine_search_angle_offset: 0.00349
coarse_search_angle_offset: 0.349
coarse_angle_resolution: 0.0349
minimum_angle_penalty: 0.9
minimum_distance_penalty: 0.5
use_response_expansion: true
